<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0D0D0D"/>
  <rect width="1200" height="630" fill="url(#grad)" fill-opacity="0.1"/>
  
  <circle cx="200" cy="100" r="300" fill="#A855F7" fill-opacity="0.1" filter="blur(100px)"/>
  <circle cx="1000" cy="530" r="300" fill="#06B6D4" fill-opacity="0.1" filter="blur(100px)"/>

  <rect x="100" y="100" width="80" height="80" rx="20" fill="url(#grad)"/>
  <text x="140" y="148" dominant-baseline="middle" text-anchor="middle" font-size="40" fill="white">🧠</text>
  
  <text x="100" y="320" font-family="sans-serif" font-weight="bold" font-size="90" fill="white">OneBrain</text>
  <text x="100" y="420" font-family="sans-serif" font-size="40" fill="#9CA3AF">Personal AI OS for Obsidian</text>
  
  <rect x="100" y="500" width="300" height="60" rx="30" fill="url(#grad)"/>
  <text x="250" y="542" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="24" fill="white">onebrain.run</text>

  <defs>
